[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    gpu: marks tests that require a GPU (deselect with -m "not gpu")
    integration: marks integration tests that require API keys or downloads

# Minimum pytest version
minversion = 7.0
